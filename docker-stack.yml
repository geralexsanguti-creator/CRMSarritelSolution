version: '3.8'

services:
  postgres:
    image: geralexsanguti/postgres:18
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: A*mma+t2026/*
      POSTGRES_DB: crmsarritel
    networks:
      - easypanel
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      replicas: 1
      resources:
        limits:
          memory: 512M

  api:
    image: geralexsanguti/crmsarritelapi:latest
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__DefaultConnection: Host=postgres;Port=5432;Database=crmsarritel;Username=postgres;Password=A*mma+t2026/*
      ConnectionStrings__GrafanaConnection: Host=grafana;Port=3000;Database=grafana;Username=admin;Password=admin
    networks:
      - easypanel
    depends_on:
      - postgres
      - grafana
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8080/health"]
      interval: 15s
      timeout: 5s
      retries: 5
    deploy:
      replicas: 1
      resources:
        limits:
          memory: 512M

  frontend:
    image: geralexsanguti/crmsarritelfront:v6
    networks:
      - easypanel
    deploy:
      replicas: 1
      resources:
        limits:
          memory: 256M

  grafana:
    image: geralexsanguti/grafana:latest
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_DATABASE_TYPE: postgres
      GF_DATABASE_HOST: postgres:5432
      GF_DATABASE_NAME: grafana
      GF_DATABASE_USER: postgres
      GF_DATABASE_PASSWORD: A*mma+t2026/*
    networks:
      - easypanel
    depends_on:
      - postgres
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000/api/health"]
      interval: 15s
      timeout: 5s
      retries: 5
    deploy:
      replicas: 1
      resources:
        limits:
          memory: 256M

networks:
  easypanel:
    external: true
    name: easypanel
