version: '3.8'

services:
  # Reverse Proxy (Nginx)
  reverse-proxy:
    image: nginx:alpine
    container_name: crmsarritel-proxy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx-proxy.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api
      - frontend
    networks:
      - crm-network

  # API Backend
  api:
    build:
      context: .
      dockerfile: CRMSarritelApi/Dockerfile
    container_name: crmsarritel-api
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ConnectionStrings__CRMSarritelConnection=Host=postgres;Port=5432;Database=crmsarritel;Username=postgres;Password=${POSTGRES_PASSWORD:-postgres}
      - AppSettings__Token=${JWT_TOKEN:-change-this-secret}
    depends_on:
      - postgres
    networks:
      - crm-network
    restart: unless-stopped

  # Frontend (static files - served by proxy)
  frontend:
    build:
      context: ./CRMSarritelFront
      dockerfile: Dockerfile
    container_name: crmsarritel-frontend
    networks:
      - crm-network
    restart: unless-stopped

  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: crmsarritel-db
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres}
      - POSTGRES_DB=crmsarritel
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - crm-network
    restart: unless-stopped

  # Prometheus (Metrics)
  prometheus:
    image: prom/prometheus:latest
    container_name: crmsarritel-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    networks:
      - crm-network
    restart: unless-stopped

  # Grafana (Dashboards)
  grafana:
    image: grafana/grafana:latest
    container_name: crmsarritel-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GF_ADMIN_PASSWORD:-admin}
      - GF_INSTALL_PLUGINS=grafana-piechart-panel
    volumes:
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus
    networks:
      - crm-network
    restart: unless-stopped

networks:
  crm-network:
    driver: bridge

volumes:
  postgres-data:
  prometheus-data:
  grafana-data: