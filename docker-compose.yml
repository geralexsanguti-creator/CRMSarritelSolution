version: '3.8'

services:
  # API Backend
  api:
    build:
      context: .
      dockerfile: CRMSarritelApi/Dockerfile
    container_name: crmsarritel-api
    ports:
      - "5000:5000"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ConnectionStrings__CRMSarritelConnection=Host=postgres;Port=5432;Database=crmsarritel;Username=postgres;Password=postgres
      - AppSettings__Token=${JWT_TOKEN:-your-secret-token-here}
    depends_on:
      - postgres
    networks:
      - crm-network

  # Frontend
  frontend:
    build:
      context: ./CRMSarritelFront
      dockerfile: Dockerfile
    container_name: crmsarritel-frontend
    ports:
      - "80:80"
    environment:
      - VITE_API_URL=http://api:5000
    depends_on:
      - api
    networks:
      - crm-network

  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: crmsarritel-db
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=crmsarritel
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - crm-network

  # Prometheus (Metrics)
  prometheus:
    image: prom/prometheus:latest
    container_name: crmsarritel-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
    networks:
      - crm-network

  # Grafana (Dashboards)
  grafana:
    image: grafana/grafana:latest
    container_name: crmsarritel-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_INSTALL_PLUGINS=grafana-piechart-panel
    volumes:
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus
    networks:
      - crm-network

networks:
  crm-network:
    driver: bridge

volumes:
  postgres-data:
  prometheus-data:
  grafana-data: