version: '3.8'

services:
  # API Backend
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: crmsarritel-api
    ports:
      - "8080:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ConnectionStrings__CRMSarritelConnection=Host=postgres;Port=5432;Database=CRMSarritelDb;Username=postgres;Password=${POSTGRES_PASSWORD:-A*mma+t2026/*-}
      - AppSettings__Token=${JWT_TOKEN:-OwrVqv5gN90gmIx5zrwbOLxPYgqazdZNFVTdoxwhFEZQnNp2u0sjCDeA4uUWNB0O}
      - AppSettings__Issuer=CRMSarritelApp
      - AppSettings__Audience=CRMSarritelAudience
    depends_on:
      - postgres
    networks:
      - crm-network
    restart: unless-stopped

  # Frontend (static files)
  frontend:
    build:
      context: ./CRMSarritelFront
      dockerfile: Dockerfile
    container_name: crmsarritel-frontend
    ports:
      - "80:80"
    environment:
      - VITE_API_URL=http://api:8080
    depends_on:
      - api
    networks:
      - crm-network
    restart: unless-stopped

  # PostgreSQL Database
  postgres:
    image: postgres:18-alpine
    container_name: crmsarritel-db
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-A*mma+t2026/*-}
      - POSTGRES_DB=CRMSarritelDb
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - crm-network
    restart: unless-stopped

  # Prometheus (Metrics)
  prometheus:
    image: prom/prometheus:latest
    container_name: crmsarritel-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    networks:
      - crm-network
    restart: unless-stopped

  # Grafana (Dashboards)
  grafana:
    image: grafana/grafana:latest
    container_name: crmsarritel-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GF_ADMIN_PASSWORD:-admin}
      - GF_INSTALL_PLUGINS=grafana-piechart-panel
    volumes:
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus
    networks:
      - crm-network
    restart: unless-stopped

networks:
  crm-network:
    driver: bridge

volumes:
  postgres-data:
  prometheus-data:
  grafana-data: